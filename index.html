<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日記英文單字</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 FontAwesome 圖示 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 自訂動畫與樣式 -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    
    /* 單字卡翻轉效果輔助 */
    .card-transition { transition: all 0.5s ease; }
    .card-unflipped { transform: scale(0.98); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .card-flipped { transform: scale(1); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    /* 隱藏滾動條但保持可滾動 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center">

  <!-- 頂部導覽列 -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm w-full">
    <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
      <div id="logo-btn" class="flex items-center text-blue-600 font-bold text-lg cursor-pointer">
        <i class="fa-solid fa-book-open mr-2"></i> VocabDaily
      </div>
      <button id="nav-quit-btn" class="hidden text-gray-400 hover:text-gray-600 transition-colors text-sm font-medium bg-gray-100 px-3 py-1.5 rounded-full">
        中斷離開
      </button>
    </div>
  </header>

  <!-- 主要內容區 -->
  <main class="w-full max-w-md mx-auto h-[calc(100vh-64px)] overflow-y-auto no-scrollbar relative">
    
    <!-- 首頁畫面 -->
    <div id="screen-home" class="flex flex-col items-center justify-center h-full space-y-6 p-6 text-center animate-fade-in">
      <div class="bg-blue-100 p-6 rounded-full shadow-inner mb-2">
        <i class="fa-solid fa-brain text-5xl text-blue-600"></i>
      </div>
      <div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">每日記英文單字</h1>
        <p class="text-gray-500">每天 <span id="home-daily-goal">5</span> 個單字，積少成多，提升英語力！</p>
      </div>
      
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 w-full">
        <div class="flex justify-between items-center mb-6">
          <span class="text-gray-600 font-medium">今日任務目標</span>
          <span class="bg-blue-100 text-blue-700 py-1 px-3 rounded-full text-sm font-bold"><span id="home-daily-goal-badge">5</span> 字</span>
        </div>
        
        <div class="space-y-4">
          <button id="btn-start-learning" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center transition-all transform hover:scale-[1.02] active:scale-95 shadow-md">
            <i class="fa-solid fa-book-open mr-2"></i> 開始今日學習 <i class="fa-solid fa-arrow-right ml-auto"></i>
          </button>
          
          <button id="btn-view-history" class="w-full bg-white hover:bg-gray-50 text-gray-700 border-2 border-gray-200 font-bold py-4 px-6 rounded-xl flex items-center justify-center transition-all transform hover:scale-[1.02] active:scale-95">
            <i class="fa-solid fa-clock-rotate-left mr-2 text-gray-500"></i> 查看歷史紀錄 <i class="fa-solid fa-chevron-right ml-auto text-gray-400"></i>
          </button>
        </div>
      </div>
      
      <div id="cloud-status" class="text-xs text-gray-400 mt-4">正在連線雲端服務...</div>
    </div>

    <!-- 學習單字畫面 -->
    <div id="screen-learning" class="hidden flex-col h-full p-4 animate-fade-in">
      <div class="mb-6">
        <div class="flex justify-between text-sm text-gray-500 mb-2 font-medium">
          <span>學習進度</span>
          <span id="learning-progress-text">0 / 5</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2.5">
          <div id="learning-progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
      </div>

      <div class="flex-1 flex flex-col items-center justify-center min-h-[400px]">
        <div id="flashcard" class="w-full bg-white rounded-3xl border border-gray-100 p-8 flex flex-col items-center text-center card-transition card-unflipped">
          <div class="flex items-center justify-center space-x-4 mb-2">
            <h2 id="fc-en" class="text-4xl font-extrabold text-gray-800">Word</h2>
            <button id="fc-audio-en" class="p-3 bg-gray-50 rounded-full hover:bg-blue-50 text-gray-500 hover:text-blue-600 transition-colors">
              <i class="fa-solid fa-volume-high text-xl"></i>
            </button>
          </div>
          
          <!-- 未翻轉狀態 -->
          <div id="fc-front" class="mt-12 flex flex-col items-center w-full">
            <button id="btn-flip" class="bg-blue-50 text-blue-600 font-semibold py-3 px-8 rounded-full hover:bg-blue-100 transition-colors flex items-center">
              <i class="fa-solid fa-book-open mr-2"></i> 顯示字義與例句
            </button>
          </div>

          <!-- 已翻轉狀態 -->
          <div id="fc-back" class="hidden mt-6 w-full animate-fade-in-up space-y-6">
            <div class="bg-blue-50/50 p-4 rounded-xl flex items-center justify-center">
              <span id="fc-pos" class="text-blue-600 font-bold mr-3 text-lg bg-white px-2 py-1 rounded shadow-sm">pos.</span>
              <span id="fc-zh" class="text-2xl font-bold text-gray-800">中文意思</span>
            </div>
            <div class="text-left border-l-4 border-blue-300 bg-blue-50/30 p-4 rounded-r-xl">
              <p id="fc-ex" class="text-gray-700 italic text-lg mb-2">"Example sentence."</p>
              <button id="fc-audio-ex" class="text-sm font-semibold text-blue-500 hover:text-blue-700 flex items-center">
                <i class="fa-solid fa-volume-high mr-1"></i> 聆聽整句發音
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="learning-actions" class="mt-8 grid grid-cols-2 gap-4 transition-opacity duration-300 opacity-0 pointer-events-none">
        <button id="btn-feedback-no" class="flex flex-col items-center justify-center py-4 rounded-2xl bg-red-50 text-red-600 hover:bg-red-100 font-bold border border-red-100 transition-colors shadow-sm">
          <i class="fa-solid fa-xmark text-3xl mb-1"></i> 還不熟
        </button>
        <button id="btn-feedback-yes" class="flex flex-col items-center justify-center py-4 rounded-2xl bg-green-50 text-green-600 hover:bg-green-100 font-bold border border-green-100 transition-colors shadow-sm">
          <i class="fa-solid fa-check text-3xl mb-1"></i> 記住了
        </button>
      </div>
    </div>

    <!-- 測驗畫面 -->
    <div id="screen-quiz" class="hidden flex-col h-full p-4 animate-fade-in">
      <div class="mb-8">
        <div class="flex justify-between text-sm text-gray-500 mb-2 font-medium">
          <span>隨堂測驗</span>
          <span id="quiz-progress-text">1 / 5</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div id="quiz-progress-bar" class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>

      <div class="text-center mb-10">
        <h3 class="text-sm text-gray-500 uppercase tracking-widest font-semibold mb-2">請選出正確的中文意思</h3>
        <div class="flex items-center justify-center space-x-3 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
          <h2 id="quiz-word-en" class="text-4xl font-extrabold text-gray-800">Word</h2>
          <button id="quiz-audio" class="p-2 text-gray-400 hover:text-indigo-500 transition-colors bg-gray-50 rounded-full">
            <i class="fa-solid fa-volume-high text-xl"></i>
          </button>
        </div>
      </div>

      <div id="quiz-options" class="space-y-4">
        <!-- 選項由 JS 動態生成 -->
      </div>
    </div>

    <!-- 總結畫面 -->
    <div id="screen-summary" class="hidden flex-col items-center justify-center h-full p-6 text-center animate-fade-in">

        </div>
      </div>

            <p class="text-gray-500 text-sm mb-1">學習單字數</p>
            <p id="summary-total" class="text-3xl font-bold text-blue-600">5</p>
          </div>
          <div>
            <p class="text-gray-500 text-sm mb-1">測驗得分</p>
            <p id="summary-score" class="text-3xl font-bold text-indigo-600">5/5</p>
          </div>
        </div>
        
        <div id="summary-stars" class="flex justify-center text-gray-200 space-x-1 text-3xl">
          <i class="fa-solid fa-star"></i>
          <i class="fa-solid fa-star"></i>
          <i class="fa-solid fa-star"></i>
        </div>

      <div class="space-y-3 w-full">

        </button>
        <button id="btn-sum-home" class="bg-gray-900 text-white font-bold py-4 px-8 rounded-xl w-full hover:bg-gray-800 transition-colors flex items-center justify-center shadow-lg">
          <i class="fa-solid fa-rotate-right mr-2"></i> 回到首頁
        </button>
      </div>
    </div>

    <!-- 歷史紀錄畫面 -->
    <div id="screen-history" class="hidden flex-col h-full p-4 animate-fade-in">
      <div class="flex items-center mb-6">
        <button id="btn-hist-back" class="p-2 mr-3 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors flex items-center justify-center w-10 h-10">
          <i class="fa-solid fa-arrow-left text-gray-700"></i>
        </button>
        <h2 class="text-2xl font-bold text-gray-800">學習歷史紀錄</h2>
      </div>

      <div class="bg-gradient-to-r from-indigo-500 to-blue-500 rounded-2xl p-6 text-white mb-6 shadow-md">
        <div class="flex items-center space-x-4">
          <div class="bg-white/20 p-3 rounded-full flex items-center justify-center w-14 h-14">
            <i class="fa-solid fa-database text-2xl"></i>
          </div>
          <div>
            <p class="text-blue-100 text-sm font-medium">總計學過單字</p>
            <p id="history-total-count" class="text-3xl font-extrabold">0</p>
          </div>
        </div>
      </div>

      <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col min-h-[300px]">
        <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between text-sm font-medium text-gray-500">
          <span>單字</span>
          <span>答對次數</span>
        </div>
        
        <div id="history-list" class="flex-1 overflow-y-auto p-2 space-y-2">
          <!-- 歷史紀錄由 JS 動態生成 -->
        </div>
      </div>
    </div>
  </main>

  <!-- 自訂確認中斷彈窗 -->
  <div id="modal-quit" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center animate-fade-in p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl transform transition-all">
      <div class="flex items-center justify-center w-12 h-12 rounded-full bg-red-100 text-red-600 mb-4 mx-auto">
        <i class="fa-solid fa-triangle-exclamation text-xl"></i>
      </div>
      <h3 class="text-xl font-bold text-center text-gray-800 mb-2">確定要中斷學習嗎？</h3>
      <p class="text-center text-gray-500 mb-6">目前的學習進度將不會被保留。</p>
      <div class="flex space-x-3">
        <button id="btn-modal-cancel" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition-colors">取消</button>
        <button id="btn-modal-confirm" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 transition-colors shadow-lg shadow-red-200">確定中斷</button>
      </div>
    </div>
  </div>

    const DAILY_GOAL = 5;
    
    // 全局狀態變數
    let appState = 'home';
    let learningQueue = [];
    let todayWords = [];
    let learnedCount = 0;
    let isFlipped = false;
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let quizScore = 0;
    let selectedAnswer = null;
    let historyData = [];
    let currentUser = null;

    // Firebase 初始化 (如果全域環境有設定，則使用環境設定；否則使用備用設定或捕捉錯誤)
    let app, auth, db;
    try {
      const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.warn("Firebase not fully configured or missing config:", e);
    }
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'html-vocab-app-id';

    // 處理 Firebase 認證
    if (auth) {
      const initAuth = async () => {
        try {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch (error) {
          console.error("Auth error:", error);
        }
      };
      initAuth();

      onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
          fetchHistory();
        }
      });
    }

    // 讀取歷史紀錄
    function fetchHistory() {
      if (!currentUser || !db) return;
      const historyRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'wordHistory');
      const q = query(historyRef);
      
      onSnapshot(q, (snapshot) => {
        const records = [];
        snapshot.forEach((doc) => {
          records.push({ id: doc.id, ...doc.data() });
        });
        records.sort((a, b) => b.learnedTimes - a.learnedTimes);
        historyData = records;
        updateCloudStatus();
        renderHistoryList();
      }, (error) => {
        console.error("Fetch history error:", error);
      });
    }

    // 儲存至雲端
    async function saveToHistory(word) {
      if (!currentUser || !db) return;
      try {
        const wordRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'wordHistory', word.id.toString());
        const docSnap = await getDoc(wordRef);
        
        if (docSnap.exists()) {
          await setDoc(wordRef, {
            ...docSnap.data(),
            learnedTimes: docSnap.data().learnedTimes + 1,
            lastLearned: new Date().toISOString()
          });
        } else {
          await setDoc(wordRef, {
            wordId: word.id,
            en: word.en,
            zh: word.zh,
            learnedTimes: 1,
            firstLearned: new Date().toISOString(),
            lastLearned: new Date().toISOString()
          });
        }
      } catch (error) {
        console.error("Save history error:", error);
      }
    }

    // 語音播放功能
    window.playAudio = function(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    };

    // 取得隨機選項
    function getRandomOptions(correctAnswer, allWords) {
      const options = [correctAnswer];
      const pool = allWords.filter(w => w.zh !== correctAnswer.zh);
      const shuffledPool = [...pool].sort(() => 0.5 - Math.random());
      options.push(...shuffledPool.slice(0, 3));
      return options.sort(() => 0.5 - Math.random());
    }

    // 切換畫面
    function switchScreen(screen) {
      appState = screen;
      document.querySelectorAll('main > div').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('main > div').forEach(el => el.classList.remove('flex'));
      
      const target = document.getElementById(`screen-${screen}`);
      if (target) {
        target.classList.remove('hidden');
        target.classList.add('flex');
      }
      
      // 更新頂部按鈕狀態
      const quitBtn = document.getElementById('nav-quit-btn');
      if (screen !== 'home' && screen !== 'summary' && screen !== 'history') {
        quitBtn.classList.remove('hidden');
      } else {
        quitBtn.classList.add('hidden');
      }
    }

    // 開始學習
    function startLearning() {
      const shuffled = [...WORD_DATABASE].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, DAILY_GOAL);
      todayWords = selected;
      learningQueue = [...selected];
      learnedCount = 0;
      isFlipped = false;
      
      renderLearningScreen();
      switchScreen('learning');
    }

    // 渲染學習畫面
    function renderLearningScreen() {
      if (learningQueue.length === 0) {
        prepareQuiz(todayWords);
        return;
      }

      const currentWord = learningQueue[0];
      const total = learnedCount + learningQueue.length;
      const progress = (learnedCount / total) * 100;

      // 更新進度
      document.getElementById('learning-progress-text').innerText = `${learnedCount} / ${total}`;
      document.getElementById('learning-progress-bar').style.width = `${progress}%`;

      // 更新單字內容
      document.getElementById('fc-en').innerText = currentWord.en;
      document.getElementById('fc-pos').innerText = currentWord.pos;
      document.getElementById('fc-zh').innerText = currentWord.zh;
      document.getElementById('fc-ex').innerText = `"${currentWord.ex}"`;

      // 綁定音頻按鈕
      document.getElementById('fc-audio-en').onclick = (e) => { e.stopPropagation(); playAudio(currentWord.en); };
      document.getElementById('fc-audio-ex').onclick = (e) => { e.stopPropagation(); playAudio(currentWord.ex); };

      // 設置翻轉狀態
      setCardFlipped(false);
    }

    // 設定單字卡翻轉狀態
    function setCardFlipped(flipped) {
      isFlipped = flipped;
      const card = document.getElementById('flashcard');
      const front = document.getElementById('fc-front');
      const back = document.getElementById('fc-back');
      const actions = document.getElementById('learning-actions');

      if (flipped) {
        card.classList.remove('card-unflipped');
        card.classList.add('card-flipped');
        front.classList.add('hidden');
        back.classList.remove('hidden');
        actions.classList.remove('opacity-0', 'pointer-events-none');
        actions.classList.add('opacity-100');
      } else {
        card.classList.add('card-unflipped');
        card.classList.remove('card-flipped');
        front.classList.remove('hidden');
        back.classList.add('hidden');
        actions.classList.add('opacity-0', 'pointer-events-none');
        actions.classList.remove('opacity-100');
      }
    }

    // 處理學習回饋
    function handleWordFeedback(isKnown) {
      const currentWord = learningQueue.shift(); // 移除第一個
      if (isKnown) {
        learnedCount++;
      } else {
        learningQueue.push(currentWord); // 不熟放回後面
      }
      renderLearningScreen();
    }

    // 準備測驗
    function prepareQuiz(words) {
      const questions = words.map(word => ({
        word: word,
        options: getRandomOptions(word, WORD_DATABASE)
      }));
      
      quizQuestions = questions.sort(() => 0.5 - Math.random());
      currentQuizIndex = 0;
      quizScore = 0;
      selectedAnswer = null;
      
      renderQuizScreen();
      switchScreen('quiz');
    }

    // 渲染測驗畫面
    function renderQuizScreen() {
      const currentQ = quizQuestions[currentQuizIndex];
      const progress = (currentQuizIndex / quizQuestions.length) * 100;

      // 更新進度與題目
      document.getElementById('quiz-progress-text').innerText = `${currentQuizIndex + 1} / ${quizQuestions.length}`;
      document.getElementById('quiz-progress-bar').style.width = `${progress}%`;
      document.getElementById('quiz-word-en').innerText = currentQ.word.en;
      document.getElementById('quiz-audio').onclick = () => playAudio(currentQ.word.en);

      // 生成選項
      const optionsContainer = document.getElementById('quiz-options');
      optionsContainer.innerHTML = '';

      currentQ.options.forEach((option, idx) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-5 rounded-2xl text-lg font-medium transition-all duration-300 flex justify-between items-center bg-white border-2 border-gray-100 text-gray-700 hover:border-indigo-300 hover:bg-indigo-50 shadow-sm";
        
        const span = document.createElement('span');
        span.innerText = option.zh;
        btn.appendChild(span);

        // 綁定點擊事件
        btn.onclick = () => handleAnswerSelect(option, currentQ, btn);
        optionsContainer.appendChild(btn);
      });
    }

    // 處理答案選擇
    function handleAnswerSelect(option, currentQ, selectedBtn) {
      if (selectedAnswer !== null) return; // 鎖定作答
      selectedAnswer = option;
      
      const isCorrect = option.id === currentQ.word.id;
      const allBtns = document.getElementById('quiz-options').querySelectorAll('button');
      
      allBtns.forEach(btn => {
        btn.disabled = true;
        const textSpan = btn.querySelector('span');
        const isThisBtnCorrect = currentQ.options.find(o => o.zh === textSpan.innerText).id === currentQ.word.id;
        
        if (btn === selectedBtn) {
          if (isCorrect) {
            btn.className = "w-full text-left p-5 rounded-2xl text-lg font-medium transition-all duration-300 flex justify-between items-center bg-green-50 border-2 border-green-500 text-green-700 font-bold shadow-md transform scale-[1.02]";
            btn.innerHTML += '<i class="fa-solid fa-check text-green-500 text-xl"></i>';
            quizScore++;
            saveToHistory(currentQ.word);
          } else {
            btn.className = "w-full text-left p-5 rounded-2xl text-lg font-medium transition-all duration-300 flex justify-between items-center bg-red-50 border-2 border-red-400 text-red-700";
            btn.innerHTML += '<i class="fa-solid fa-xmark text-red-500 text-xl"></i>';
          }
        } else {
          if (isThisBtnCorrect && !isCorrect) {
             // 標示出正確答案
             btn.className = "w-full text-left p-5 rounded-2xl text-lg font-medium transition-all duration-300 flex justify-between items-center bg-green-50 border-2 border-green-500 text-green-700";
             btn.innerHTML += '<i class="fa-solid fa-check text-green-500 text-xl"></i>';
          } else {
             btn.className = "w-full text-left p-5 rounded-2xl text-lg font-medium transition-all duration-300 flex justify-between items-center bg-gray-50 border-2 border-gray-100 text-gray-400 opacity-50";
          }
        }
      });

      // 延遲跳轉
      setTimeout(() => {
        if (currentQuizIndex < quizQuestions.length - 1) {
          currentQuizIndex++;
          selectedAnswer = null;
          renderQuizScreen();
        } else {
          renderSummaryScreen();
          switchScreen('summary');
        }
      }, 1500);
    }

    // 渲染總結畫面
    function renderSummaryScreen() {
      document.getElementById('summary-total').innerText = todayWords.length;
      document.getElementById('summary-score').innerText = `${quizScore}/${quizQuestions.length}`;
      
      const starsContainer = document.getElementById('summary-stars');
      starsContainer.innerHTML = '';
      const ratio = quizScore / quizQuestions.length;
      let activeStars = ratio === 1 ? 3 : (ratio >= 0.6 ? 2 : 1);
      
      for(let i=1; i<=3; i++) {
        const star = document.createElement('i');
        star.className = `fa-solid fa-star ${i <= activeStars ? 'text-yellow-400' : 'text-gray-200'}`;
        starsContainer.appendChild(star);
      }

      const msg = document.getElementById('summary-msg');
      msg.innerText = ratio === 1 ? "太棒了！滿分過關！紀錄已儲存。" : "繼續保持，明天再接再厲！";
    }

    // 渲染歷史紀錄清單
    function renderHistoryList() {
      document.getElementById('history-total-count').innerText = historyData.length;
      const listContainer = document.getElementById('history-list');
      listContainer.innerHTML = '';

      if (historyData.length === 0) {
        listContainer.innerHTML = `
          <div class="text-center py-12 text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-clock-rotate-left text-5xl mb-3 opacity-50"></i>
            <p>目前還沒有紀錄喔</p>
            <p class="text-sm mt-1">快去完成今日的學習吧！</p>
          </div>
        `;
        return;
      }

      historyData.forEach(record => {
        const item = document.createElement('div');
        item.className = "flex justify-between items-center p-3 hover:bg-blue-50 rounded-xl transition-colors group cursor-pointer";
        item.onclick = () => window.playAudio(record.en); // 點擊整列發音
        
        item.innerHTML = `
          <div class="flex flex-col">
            <div class="flex items-center space-x-2">
              <span class="font-bold text-gray-800 text-lg">${record.en}</span>
              <button class="text-gray-300 group-hover:text-blue-500 transition-colors">
                <i class="fa-solid fa-volume-high text-sm"></i>
              </button>
            </div>
            <span class="text-sm text-gray-500">${record.zh}</span>
          </div>
          <div class="flex items-center justify-center w-8 h-8 bg-blue-100 text-blue-700 font-bold rounded-full text-sm">
            ${record.learnedTimes}
          </div>
        `;
        listContainer.appendChild(item);
      });
    }

    // 更新雲端狀態文字
    function updateCloudStatus() {
      const statusDiv = document.getElementById('cloud-status');
      if (currentUser) {
        statusDiv.innerText = `已連線雲端存檔 (${historyData.length} 字)`;
      }
    }

    // DOM 事件綁定
    document.addEventListener('DOMContentLoaded', () => {
      // 首頁數字初始化
      document.getElementById('home-daily-goal').innerText = DAILY_GOAL;
      document.getElementById('home-daily-goal-badge').innerText = DAILY_GOAL;

      // 按鈕事件
      document.getElementById('btn-start-learning').addEventListener('click', startLearning);
      document.getElementById('btn-view-history').addEventListener('click', () => switchScreen('history'));
      document.getElementById('btn-flip').addEventListener('click', () => setCardFlipped(true));
      document.getElementById('btn-feedback-no').addEventListener('click', () => handleWordFeedback(false));
      document.getElementById('btn-feedback-yes').addEventListener('click', () => handleWordFeedback(true));
      document.getElementById('btn-sum-history').addEventListener('click', () => switchScreen('history'));
      document.getElementById('btn-sum-home').addEventListener('click', () => switchScreen('home'));
      document.getElementById('btn-hist-back').addEventListener('click', () => switchScreen('home'));
      
      // 頂部導覽列點擊
      document.getElementById('logo-btn').addEventListener('click', () => {
        if(appState !== 'home') switchScreen('home');
      });

      // 中斷離開 Modal 處理
      const quitBtn = document.getElementById('nav-quit-btn');
      const modal = document.getElementById('modal-quit');
      const cancelBtn = document.getElementById('btn-modal-cancel');
      const confirmBtn = document.getElementById('btn-modal-confirm');

      quitBtn.addEventListener('click', () => {
        modal.classList.remove('hidden');
      });
      
      cancelBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
      });

      confirmBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
        switchScreen('home');
      });
    });

  </script>
</body>
</html>
